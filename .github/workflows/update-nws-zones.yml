name: Update NWS zones

# Runs once a day to check the TAHC endpoint and append a zone snapshot
# if anything significant changed. Commits straight back to the repo (which
# triggers a Pages rebuild). On failure, opens a GitHub issue to alert you.

on:
  schedule:
    # 11:00 UTC daily (~6am Central). Adjust the cron if you prefer another time.
    - cron: "0 11 * * *"
  workflow_dispatch:        # lets you run it by hand from the Actions tab
    inputs:
      dry_run:
        description: "Dry run (no commit)?"
        type: boolean
        default: false

permissions:
  contents: write           # needed to commit zone-history.json
  issues: write             # needed to open an alert issue on failure

concurrency:
  group: update-nws-zones
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run zone updater
        id: run
        env:
          # default = commit; the manual dry-run input flips it off
          COMMIT: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '0' || '1' }}
        run: |
          python update_zones.py ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || '--commit' }}

      - name: Commit & push if changed
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          if [[ -n "$(git status --porcelain zone-history.json)" ]]; then
            git config user.name  "nws-zone-bot"
            git config user.email "actions@users.noreply.github.com"
            git add zone-history.json
            git commit -m "Auto: append NWS zone snapshot ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed a new snapshot."
          else
            echo "No file change; nothing to commit."
          fi

      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `NWS zone updater failed (${new Date().toISOString().slice(0,10)})`,
              body: [
                "The daily NWS zone updater run failed.",
                "",
                "This usually means the TAHC endpoint was unreachable, returned an",
                "unexpected response, or the script hit an error. The map is unaffected —",
                "it keeps showing the last good snapshot. No data was changed.",
                "",
                `[View the failed run](${run})`,
                "",
                "If this repeats for several days, the endpoint URL or its data format",
                "may have changed and the script needs a look."
              ].join("\n")
            });
